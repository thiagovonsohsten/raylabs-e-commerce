services:
  postgres:
    image: postgres:16-alpine
    container_name: raylabs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raylabs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-raylabs}
      POSTGRES_DB: ${POSTGRES_DB:-raylabs}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raylabs} -d ${POSTGRES_DB:-raylabs}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    build:
      context: ./docker/rabbitmq
    container_name: raylabs-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-raylabs}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-raylabs}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: raylabs-api
    restart: unless-stopped
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/main/bootstrap-api.js"]
    environment:
      API_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-raylabs}:${POSTGRES_PASSWORD:-raylabs}@postgres:5432/${POSTGRES_DB:-raylabs}?schema=public
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-raylabs}:${RABBITMQ_PASSWORD:-raylabs}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MAX_DELIVERY_ATTEMPTS: ${MAX_DELIVERY_ATTEMPTS:-4}
      RETRY_BASE_DELAY_MS: ${RETRY_BASE_DELAY_MS:-1000}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: raylabs-payment-consumer
    restart: unless-stopped
    command: ["node", "dist/main/bootstrap-payment-consumer.js"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-raylabs}:${POSTGRES_PASSWORD:-raylabs}@postgres:5432/${POSTGRES_DB:-raylabs}?schema=public
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-raylabs}:${RABBITMQ_PASSWORD:-raylabs}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PAYMENT_SUCCESS_RATE: ${PAYMENT_SUCCESS_RATE:-0.9}
      PAYMENT_PROCESSING_MS: ${PAYMENT_PROCESSING_MS:-500}
      MAX_DELIVERY_ATTEMPTS: ${MAX_DELIVERY_ATTEMPTS:-4}
      RETRY_BASE_DELAY_MS: ${RETRY_BASE_DELAY_MS:-1000}
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inventory-consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: raylabs-inventory-consumer
    restart: unless-stopped
    command: ["node", "dist/main/bootstrap-inventory-consumer.js"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-raylabs}:${POSTGRES_PASSWORD:-raylabs}@postgres:5432/${POSTGRES_DB:-raylabs}?schema=public
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-raylabs}:${RABBITMQ_PASSWORD:-raylabs}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MAX_DELIVERY_ATTEMPTS: ${MAX_DELIVERY_ATTEMPTS:-4}
      RETRY_BASE_DELAY_MS: ${RETRY_BASE_DELAY_MS:-1000}
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  outbox-relay:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: raylabs-outbox-relay
    restart: unless-stopped
    command: ["node", "dist/main/bootstrap-outbox-relay.js"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-raylabs}:${POSTGRES_PASSWORD:-raylabs}@postgres:5432/${POSTGRES_DB:-raylabs}?schema=public
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-raylabs}:${RABBITMQ_PASSWORD:-raylabs}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-20}
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: raylabs-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - api

volumes:
  postgres-data:
  rabbitmq-data:
